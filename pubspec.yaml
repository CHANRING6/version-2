name: mega
description: Mega Mart - Online Supermarket App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # Images — loads from URLs, NO Firebase Storage needed
  cached_network_image: ^3.4.1

  # Charts — for admin dashboard
  fl_chart: ^0.68.0

  # Loading skeleton animation
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true